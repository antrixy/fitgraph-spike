ding\",\"Let your Coach know your fitness background and what you want to achieve.\",\"TrainingPage.AppFeatures.Step2.Heading\",\"Plan your workouts into your schedule\",\"TrainingPage.AppFeatures.Step2.Subheading\",\"You decide where, when, and how to work out, and your Coach creates a plan that fits your needs.\",\"TrainingPage.AppFeatures.Step3.Heading\",\"Get the best workout routines to help you reach your goals.\",\"TrainingPage.AppFeatures.Step3.Subheading\",\"Everything from your warmup to your cooldown is built with your goals in mind.\",\"TrainingPage.AppFeatures.Step4.Heading\",\"Your workout, your way\",\"TrainingPage.AppFeatures.Step4.Subheading\",\"Do home workouts with just your body weight, add equipment, hit the gym, or go outside for a run. Adjust your workout to your needs and let the Coach do the rest.\",\"TrainingPage.AppFeatures.Step5.Heading\",\"Give your Coach feedback\",\"TrainingPage.AppFeatures.Step5.Subheading\",\"Your Coach uses this information to create future workouts and build a progressive plan that guides you to your goals.\",\"TrainingPage.AppFeatures.Cta.Title\",\"TrainingPage.Transformations.Heading\",\"Stories from Free Athletes like you\",\"TrainingPage.Transformations.Subheading\",\"See how Freeletics helped them reach their fitness goals.\",\"TrainingPage.Transformations.Cta.Title\",\"Start today\",\"TrainingPage.Pricing.Heading\",\"Digital coaching that costs less than one workout class a week\",\"CarouselMediaTestimonials.Link.read-more\",\"Read more\",\"AthleteAssessment.StepModality.Typography.Heading\",\"How would you like to achieve your health \u0026 fitness goals?\",\"AthleteAssessment.StepModality.Typography.Subheading\",\"Choose as many as you want. Your program will reflect these preferences.\",\"AthleteAssessment.StepModality.Button.Modality1.Heading\",\"Bodyweight exercises\",\"AthleteAssessment.StepModality.Button.Modality2.Heading\",\"Barbell and weights exercises\",\"AthleteAssessment.StepModality.Button.Moda g\",\"Life is unpredictable. Get the best workout app to fit your lifestyle and needs with a Coach that’s always ready to adapt at a moment’s notice.\",\"Sections.SectionFlexibility.Slides1.Title\",\"Busy? We got you.\",\"Sections.SectionFlexibility.Slides1.Detail\",\"Choose your workout days and time. Want more? Want less? Adjust whenever.\",\"Sections.SectionFlexibility.Slides2.Title\",\"No gym? No problem.\",\"Sections.SectionFlexibility.Slides2.Detail\",\"You choose your training location. Perfect weather for a run? Need to train at home or at the gym? Go for it.\",\"Sections.SectionFlexibility.Slides3.Title\",\"Bored? Not anymore.\",\"Sections.SectionFlexibility.Slides3.Detail\",\"Want to join a 30-day challenge? Want to focus on a certain area or use different gear? Your Coach is always ready with endless ways to push you and keep things fresh.\",\"Sections.SectionFlexibility.Slides4.Title\",\"Any goal. Anywhere. Anytime.\",\"Sections.SectionFlexibility.Slides4.Detail\",\"Whether you want to lose weight, build muscle, or stay fit with a blend of cardio, HIIT, gym, weights, calisthenics, or other training styles, it’s in your hands.\",\"SectionCustomTrainingJourneys.Heading\",\"The best way to train? Yours.\",\"SectionCustomTrainingJourneys.Subheading\",\"Training Journeys take your age, equipment and fitness level to design the perfect routine to achieve your goals.\",\"SectionCustomTrainingJourneys.Options.Running\",\"SectionCustomTrainingJourneys.Options.Equipment\",\"Equipment\",\"SectionCustomTrainingJourneys.Options.Bodyweight\",\"Bodyweight\",\"SectionCustomTrainingJourneys.Running.Title\",\"Training Journeys to improve \u003cspan\u003erunning\u003c/span\u003e\",\"SectionCustomTrainingJourneys.Strength.Title\",\"Training Journeys to build \u003cspan\u003estrength\u003c/span\u003e\",\"SectionCustomTrainingJourneys.Generic.Title\",\"Training Journeys to reach your \u003cspan\u003egoals\u003c/span\u003e\",\"SectionCustomTrainingJourneys.Running.SelectedJour age.CancelPlanModal.Step2\",\"Cancel your active subscription\",\"BuyCoachPage.CancelPlanModal.Step3\",\"Come back and complete your purchase\",\"BuyCoachPage.CancelPlanModal.CTA\",\"Go to Plan\",\"BuyCoachPage.CancelPlanModal.Info\",\"Don’t worry! Your subscription will be valid until its expiration date and Lifetime Access will begin after that.\",\"BuyCoachPage.ReferralDiscount.Hero.Headline\",\"Register and get a 30% discount on your Coach\",\"BuyCoachPage.Referral.HeroDiscount.Text\",\"has given you a 30% discount!\",\"BuyCoachPage.ReferralTrial.Headline\",\"{referrerName} + You =\",\"BuyCoachPage.ReferralTrial.Subheadline\",\"Fitness Buddies\",\"BuyCoachPage.ReferralTrial.Description\",\"Your friend {referrerName} sent you a gift!{lineBreak}Sign up for a 6-month training plan and get 6 extra months for free.\",\"BuyCoachPage.Benefits.Female.Benefit_1\",\"Personalized training plans match your fitness level and goals\",\"BuyCoachPage.Benefits.Female.Benefit_2\",\"Proven, powerful exercises deliver noticeable results in less time\",\"BuyCoachPage.Benefits.Female.Benefit_3\",\"Coaching intelligence adapts as you progress\",\"BuyCoachPage.Benefits.Female.Benefit_4\",\"Only 10-30 minutes for a complete workout\",\"BuyCoachPage.Benefits.Male.Benefit_1\",\"BuyCoachPage.Benefits.Male.Benefit_2\",\"BuyCoachPage.Benefits.Male.Benefit_3\",\"BuyCoachPage.Benefits.Male.Benefit_4\",\"BuyCoachPage.Benefits.Benefit1\",\"Trainings personalized to your fitness goals\",\"BuyCoachPage.Benefits.Benefit2\",\"Endless training variety, with or without equipment\",\"BuyCoachPage.Benefits.Benefit3\",\"Adaptive features to change up each workout\",\"BuyCoachPage.Benefits.Benefit4\",\"Track your progress \u0026 build healthy habits\",\"BuyCoachPage.SubscriptionFeatures.Headline\",\"Subscription features\",\"BuyCoachPage.SubscriptionFeatures.Feature1Title\",\"AI Coach + human scientists\",\"BuyCoachPage.SubscriptionFeatures.Feature1Description\",\"Your AI Coach \u0026 its adaptable algorithm are backed by a team of sports scientists, ensuring each workout is personalized to your development.\",\"BuyCoachPage.SubscriptionFeatures.Feature2Title\",\"Training statistics overview\",\"BuyCoachPage.SubscriptionFeatures.Feature2Description\",\"Keep sight of your training achievements and easily share them across your social channels.\",\"BuyCoachPage.SubscriptionFeatures.Feature3Title\",\"300+ bodyweight \u0026 gym exercises\",\"BuyCoachPage.SubscriptionFeatures.Feature3Description\",\"From no equipment to dumbbells \u0026 more, you’ll have access to over 300 targeted exercises and instructional videos.\",\"BuyCoachPage.SubscriptionFeatures.Feature4Title\",\"100+ audio sessions\",\"BuyCoachPage.SubscriptionFeatures.Feature4Description\",\"Get research-based tips on how to achieve your training, mindset, health, and nutrition goals (only available in English).\",\"BuyCoachPage.SubscriptionFeatures.Feature5Title\",\"Recipes \u0026 tailored meal plans\",\"BuyCoachPage.SubscriptionFeatures.Feature5Label\",\"NUTRITION ONLY\",\"BuyCoachPage.SubscriptionFeatures.Feature5Description\",\"Choose from recipes that fit your needs and build up your personalized meal plan.\",\"BuyCoachPage.SubscriptionFeatures.Feature7Title\",\"Track sprints \u0026 runs\",\"BuyCoachPage.SubscriptionFeatures.Feature7Description\",\"Track your sprint and running stats across any distance of your choice.\",\"BuyCoachPage.GiftCards.Headline\",\"Give Freeletics as a gift\",\"BuyCoachPage.GiftCards.Text\",\"Choose a Freeletics subscription \u0026 send the gift activation code to your family and friends\",\"BuyCoachPage.GiftCards.Link\",\"See Freeletics gift offers\",\"BuyCoachPage.Transformations.Headline\",\"Success Stories\",\"BuyCoachPage.Transformations.Subheadline\",\"97% of all users say they experience dramatic progress with the Coach after 12 weeks*\",\"BuyCoachPage.Transformations.Text\",\"* internal survey among 1000 Freeletics Coach users\",\"BuyCoachPage.Reviews.Apple.source\",\"iTunes reviews\",\"BuyCoachPage.Reviews.Apple.rating\",\"71.270 ratings\",\"BuyCoachPage.Reviews.Apple.quote\",\"I'm faster, stronger, fitter, happier and more motivated than ever. The Coach program is adaptable every week. It's perfect. Try it and you'll love it!\",\"BuyCoachPage.Reviews.Google.source\",\"Playstore reviews\",\"BuyCoachPage.Reviews.Google.rating\",\"144.624 ratings\",\"BuyCoachPage.Reviews.Google.quote\",\"The best fitness training scheme around. A brilliant training method that works with incredible results. Plus, the app is perfect. Absolutely spot on.\",\"BuyCoachPage.Reviews.Magazine_1.quote\",\"BEST FOR QUICK HIIT WORKOUTS\",\"BuyCoachPage.Reviews.Magazine_1.source\",\"Women’s Health 12.03.2020\",\"BuyCoachPage.Reviews.Magazine_2.quote\",\"If you want to crush your fitness goals quickly and easily, Freeletics is a must.\",\"BuyCoachPage.Reviews.Magazine_2.source\",\"NewBeauty 28.02.20\",\"BuyCoachPage.Reviews.Magazine_3.quote\",\"Skip out on the gym and all of the equipment that goes along with it with Freeletics.\",\"BuyCoachPage.Reviews.Magazine_3.source\",\"Men’s Health 21.11.19\",\"BuyCoachPage.Reviews.Magazine_4.quote\",\"The coaching is impressively adaptable within your training plan\",\"BuyCoachPage.Reviews.Magazine_4.source\",\"Coach Magazine 20.02.20\",\"BuyCoachPage.Reviews.Magazine_5.quote\",\"Touted as a digital personal trainer, this app has a cultish fanbase thanks to its detailed personalised fitness plans.\",\"BuyCoachPage.Reviews.Magazine_5.source\",\"The Guardian 02.01.20\",\"BuyCoachPage.FAQ.Headline\",\"Answers About the Coach\",\"BuyCoachPage.FAQ.Question_1\",\"How does the 14-day money back guarantee work?\",\"BuyCoachPage.FAQ.Answer_1\",\"Not convinced by the Coach? You can easily return it within 14 days of initial purchase without stating a reason. Just contact our customer support to get a full refund. You can still cancel your Coach subscription renewal at any time after the first 14 days. \u003ca\u003eSee more\u003c/a\u003e\",\"BuyCoachPage.FAQ.Question_2\",\"How does the subscription work?\",\"BuyCoachPage.FAQ.Answer_2\",\"With a Coach subscription you have access to all Freeletics content associated with that subscription. Your Coach starts immediately on the date of purchase and is active for the selected period. Afterwards, the Coach renews automatically by the selected payment interval. You can cancel the renewal at any time, without notice, in your account settings and continue using the Coach until your paid subscription ends. Keep training with Freeletics to develop a healthy, athletic and motivating lifestyle! \u003ca\u003eSee more\u003c/a\u003e\",\"BuyCoachPage.FAQ.Question_3\",\"What is a Training Journey?\",\"BuyCoachPage.FAQ.Answer_3\",\"The Freeletics Training Journeys are comprehensive workout plans for people of all fitness levels and training backgrounds that are designed to target your entire body, to ensure total body fitness. Each Journey provides an individualized workout experience with specific duration, focus, and training modality. No two Journeys are the same, as the Coach will continuously adapt your plan, based on your athlete profile, performance, and feedback after each workout. \u003ca\u003eSee more\u003c/a\u003e\",\"BuyCoachPage.FAQ.Question_4\",\"Can I change my week setting? (equipment, run, number of training days, limitation)\",\"BuyCoachPage.FAQ.Answer_4\",\"Your Freeletics Coach always plans the ideal week for you to maximize your progress. To allow you to train based on the equipment and space you have, you have the option of making changes to your training plan before you start a new week. \u003ca\u003eSee more\u003c/a\u003e\",\"BuyCoachPage.FAQ.Question_5\",\"How does the Coach adapt to my fitness level?\",\"BuyCoachPage.FAQ.Answer_5\",\"Your Coach learns from the feedback you give. This includes the time it takes to complete a Coach assignment, but also the answers to the questions your Coach asks after a session. Therefore, it’s very important that you answer Coach feedback questions like “How was your technique?” or “How exhausting was the session?” honestly. Your Coach can also adapt to your unique circumstances. If you can do tough exercises like muscleups or strict pullups, let your Coach know so these exercises appear in your training schedule. And if you have certain equipment like a pullup bar or low bar, let your Coach know so your Coach assigns exercises that require these pieces of equipment.\",\"BuyCoachPage.FAQ.Question_6\",\"How can I integrate the Coach training into my daily life?\",\"BuyCoachPage.FAQ.Answer_6\",\"The Coach adapts to your circumstances and lifestyle. Choose and adjust the number of training days on a weekly basis. The 2x2 feature gives you even more flexibility. Exchange all runs and distance-exercises in your Training Day with a single tap. Train at home, on the road or outside - whatever fits your daily needs.\",\"BuyCoachPage.FAQ.Question_7\",\"What is a Weight Training Journey?\",\"BuyCoachPage.FAQ.Answer_7\",\"Freeletics Weights Journeys are strength-based workout plans that are focused on muscle gain and definition. The training experience is built upon compound lifts as they activate multiple muscle groups with just one movement. These are exercises such as squats, deadlifts, bench press, push press, and rows. The minimum equipment requirements for these Journeys are a barbell, pullup bar, squat rack, and bench. \u003ca\u003eSee more\u003c/a\u003e\",\"BuyCoachPage.FAQ.Question_8\",\"Where to find my Nutrition Coach?\",\"BuyCoachPage.FAQ.Answer_8\",\"To access the Nutrition Coach, simply download Freeletics Nutrition from your App Store and log in with your Freeletics account details. You will be asked to answer some questions about your goals, food preferences and physique, after which the Nutrition Coach will generate a meal plan for you. \u003ca\u003eSee more\u003c/a\u003e\",\"BuyCoachPage.FAQ.Question_9\",\"How can I invite a friend?\",\"BuyCoachPage.FAQ.Answer_9\",\"It’s easy to invite your friends and family to start their Freeletics journey! And the best part is that you and those you invite will both benefit. \u003ca\u003eSee more\u003c/a\u003e\",\"BuyCoachPage.SectionPlans.Heading\",\"\u003cspan\u003eStart today.\u003c/span\u003e{lineBreak}Not tomorrow.\",\"BuyCoachPage.SectionPlans.Subheading\",\"Choose your plan, download the Freeletics app and start your fitness journey today!\",\"BuyCoachPage.SectionPlans.Product.Free\",\"Free Experience\",\"BuyCoachPage.SectionPlans.Product.TrainingNutrition\",\"Training + Nutrition Bundle\",\"BuyCoachPage.SectionPlans.Product.Training\",\"Training Coach\",\"BuyCoachPage.SectionPlans.Product.MostPopular\",\"Most Popular\",\"BuyCoachPage.SectionPlans.Interval.1-year\",\"12-Month Plan\",\"BuyCoachPage.SectionPlans.Feature.SignatureWorkouts\",\"Access signature workouts and build your own session\",\"BuyCoachPage.SectionPlans.Feature.Guidance\",\"Daily guidance and performance tracking from your AI Coach\",\"BuyCoachPage.SectionPlans.Feature.Personalization\",\"Personalized workouts to maximize your results\",\"BuyCoachPage.SectionPlans.Feature.TailoredSessions\",\"Tailored training sessions adjustable to your lifestyle\",\"BuyCoachPage.SectionPlans.Feature.NutritionPlan\",\"Nutrition plan with delicious meals to fuel your goals\",\"BuyCoachPage.SectionPlans.BillingInterval.1-year\",\"billed every 12 months\",\"BuyCoachPage.SuperBundle.SectionPlans.Heading\",\"BuyCoachPage.SuperBundle.SectionPlans.Subheading\",\"BuyCoachPage.SuperBundle.SectionPlans.Product.Training\",\"BuyCoachPage.SuperBundle.SectionPlans.Product.TrainingNutrition\",\"BuyCoachPage.SuperBundle.SectionPlans.Product.TrainingNutritionSpecial\",\"Super Bundle\",\"BuyCoachPage.SuperBundle.SectionPlans.Product.PlusTraining\",\"Everything in the \u003cspan\u003eTraining Coach\u003c/span\u003e plus\",\"BuyCoachPage.SuperBundle.SectionPlans.Product.PlusTrainingNutrition\",\"Everything in the \u003cspan\u003eTraining \ Voucher.Cta\",\"PartnershipPage.Voucher.Heading\",\"You've redeemed your code\",\"PartnershipPage.Voucher.Text\",\"You've redeemed your code. Now get started. First you'll complete your account information and payment details. Then you'll download the Freeletics app and log in.\",\"PartnershipPage.Voucher.Cta\",\"Create account\",\"PartnershipPage.Voucher.Link.Login\",\"I already have an account\",\"PartnershipPage.Voucher_NoClaim.Heading\",\"PartnershipPage.Voucher_NoClaim.Text\",\"You've redeemed your code. Now get started. First you'll complete your payment details. Then you'll download the Freeletics app and log in.\",\"PartnershipPage.Voucher_NoClaim.Cta\",\"PartnershipPage.Voucher_Claim.Heading\",\"Contact us to claim your voucher\",\"PartnershipPage.Voucher_Claim.Text\",\"Send your voucher code to \u003ca\u003eemail\u003c/a\u003e to add your voucher to your account.\",\"PartnershipPage.Alert.invalid_voucher\",\"Code is invalid\",\"PartnershipPage.Alert.taken_voucher\",\"Code has previously been redeemed\",\"PartnershipPage.Alert.revoked_voucher\",\"Code has previously been revoked\",\"CareerPage.Title\",\"Find your next job | FREELETICS\",\"CareerPage.Description\",\"Work at Freeletics in Munich or remotely and join the fastest growing sports and lifestyle companies in the world.\",\"CareerPage.SectionHero.Heading\",\"Together we become our best\",\"CareerPage.SectionHero.Button\",\"{count, plural, one {# open position} other {# open positions}}\",\"CareerPage.SectionHero.Claims.Heading_1\",\"Create. Impact.\",\"CareerPage.SectionHero.Claims.Body_1\",\"Own your projects. Be bold. Have your say to improve the lives of millions of users.\",\"CareerPage.SectionHero.Claims.Heading_2\",\"Achieve greatness\",\"CareerPage.SectionHero.Claims.Body_2\",\"Our company goals are ambitious and demanding. We'll get there by moving fast and accepting our mistakes.\",\"CareerPage.SectionHero.Claims.Heading_3\",\"A connected team\",\"CareerPage.SectionHero.Claims.Body_3\",\"We're made of over 35 nationalities. We recognize our differences but stand by anyone who shares our passion and vision.\",\"CareerPage.SectionTeams.Heading\",\"Explore teams\",\"CareerPage.SectionTeams.Team_1.Name\",\"Data \u0026 Finance\",\"CareerPage.SectionTeams.Team_1.Title\",\"Our number crunchers\",\"CareerPage.SectionTeams.Team_1.Body\",\"The Data \u0026 Finance Team collects, integrates and processes data into our data warehouse - providing a consistent base for analytical purposes, be it for marketing, product or financial issues. The team supports data-driven decisions, gives actionable insights and recommendations, providing reports to optimize our business performance.\",\"CareerPage.SectionTeams.Team_2.Name\",\"Product Engineering\",\"CareerPage.SectionTeams.Team_2.Title\",\"Our creators\",\"CareerPage.SectionTeams.Team_2.Body\",\"Our Product Engineering team develops, designs and manages kickass products to create the ultimate user experience. They are our hypothesisers, visionaries, and all-round (life-) hackers.\",\"CareerPage.SectionTeams.Team_3.Name\",\"People Operations\",\"CareerPage.SectionTeams.Team_3.Title\",\"Our enablers\",\"CareerPage.SectionTeams.Team_3.Body\",\"Passionate about attracting and developing talent, the People Operations team builds and supports the fast-growing team. Creating the ultimate work experience is also a priority and since we've got a hungry bunch here, constant supply is the rule.\",\"CareerPage.SectionTeams.Team_4.Name\",\"Marketing\",\"CareerPage.SectionTeams.Team_4.Title\",\"Our messengers\",\"CareerPage.SectionTeams.Team_4.Body\",\"Marketing shares the Freeletics story with the world. Through real-life campaigns, sharp content marketing and performance advertising, this team spreads the word and inspire new and existing users to unleash their potential. They are our #hashtagheroes\",\"CareerPage.SectionTeams.Team_5.Name\",\"Customer Engagement\",\"CareerPage.SectionTeams.Team_5.Title\",\"Our relationship gurus\",\"CareerPage.SectionTeams.Team_5.Body\",\"Plugged into our global community, the Customer Engagement team feels the Freeletics pulse. The team connects to users without breaking a sweat, fostering loyalty through handling anything from tough feedback to uplifting stories.\",\"CareerPage.SectionTeams.Button\",\"{count, plural, one {# current opening} other {# current openings}}\",\"CareerPage.SectionIncentives.Heading\",\"A chance to unleash your potential\",\"CareerPage.SectionIncentives.Incentive_1.Title\",\"Massive reach\",\"CareerPage.SectionIncentives.Incentive_1.Body\",\"Act within a team that's growing and takes decisions based on scalability.\",\"CareerPage.SectionIncentives.Incentive_2.Title\",\"Learn \u0026 teach\",\"CareerPage.SectionIncentives.Incentive_2.Body\",\"Develop your skills through training, conferences and language courses. Enlighten peers with your own favorite topics.\",\"CareerPage.SectionIncentives.Incentive_3.Title\",\"Inspiring office\",\"CareerPage.SectionIncentives.Incentive_3.Body\",\"Our loft-style office at the Munich HQ includes training space, workout facilities, changing rooms \u0026 healthy food.\",\"CareerPage.SectionIncentives.Incentive_4.Title\",\"Weekly events\",\"CareerPage.SectionIncentives.Incentive_4.Body\",\"Office feasts, seasonal parties and impromptu pull-up challenges fill a social calendar.\",\"CareerPage.SectionIncentives.Incentive_5.Title\",\"Giveback bonus\",\"CareerPage.SectionIncentives.Incentive_5.Body\",\"Nominate great talent to join Freeletics and we'll support your chosen charity.\",\"CareerPage.SectionIncentives.Incentive_6.Title\",\"A tech hub\",\"CareerPage.SectionIncentives.Incentive_6.Body\",\"The Munich office exchanges knowledge through hackathons and meetups, keeping us connected \u0026 open to innovate.\",\"CareerPage.SectionOffice.Heading\",\"Our office\",\"CareerPage.SectionOffice.Address\",\"Freeletics GmbH{lineBreak}Berg-am-Laim-Straße 111{lineBreak}81673 Munich{lineBreak}Germany\",\"JobsPage iment.VariantD.DiscountHighlight.Carousel.USP1\",\"Train anytime, anywhere: with a full gym, basic gear, or bodyweight only.\",\"UAPerformanceExperiment.VariantD.DiscountHighlight.Carousel.USP2\",\"Avoid injuries with detailed video guidance for each exercise\",\"UAPerformanceExperiment.VariantD.DiscountHighlight.Carousel.USP3\",\"Fun and challenging workouts, based on your level and unique goals\",\"UAPerformanceExperiment.VariantD.DiscountHighlight.Carousel.USP4\",\"Healthy and delicious nutrition plans built to support your fitness journey\",\"UAPerformanceExperiment.VariantD.DiscountHighlight.PersonalizationHeading\",\"Let’s personalize your workouts. You are...\",\"UAPerformanceExperiment.VariantD.DiscountHighlight.CTA\",\"UARetExperiment.Regular.Header.Reviews\",\"UARetExperiment.Regular.Main.Title\",\"Ready to finish what you started? Now with \u003cspan\u003e{percentage}% off.\u003c/span\u003e\",\"UARetExperiment.Regular.Main.Body\",\"You already took the first step toward your fitness goals. Now unlock the full Freeletics experience for personalized coaching, dynamic workouts, and real results.\",\"UARetExperiment.Regular.Main.CTA\",\"Get Freeletics with {percentage}% off\",\"UARetExperiment.Regular.DemoSection.Title\",\"Not sure yet? See what's inside\",\"UARetExperiment.Regular.DemoSection.Tag.TrainingPlan\",\"Training plans based on your goals\",\"UARetExperiment.Regular.DemoSection.Tag.ExerciseGuidance\",\"Exercise breakdown and guidance\",\"UARetExperiment.Regular.DemoSection.Tag.Adapt\",\"Adapts to your needs\",\"UARetExperiment.Regular.DemoSection.Tag.Equipment\",\"With or without equipment\",\"UARetExperiment.Regular.DemoSection.Tag.Anywhere\",\"Train anywhere, anytime\",\"UARetExperiment.Regular.DemoSection.CTA\",\"UARetExperiment.Superbundle.Header.Reviews\",\"UARetExperiment.Superbundle.Main.Title\",\"5 apps. Total transformation. Now with \u003cspan\u003e{percentage}% off.\u003c/span\u003e\",\"UARetExperiment.Superbundle.Main.Body\",\"You already took the first step toward your fitness goals. Now unlock your ultimate fitness package with training, mindset, recovery, nutrition and yoga — all in one Superbundle.\",\"UARetExperiment.Superbundle.Main.CTA\",\"Get the bundle with {percentage}% off\",\"UARetExperiment.Superbundle.DemoSection.Title\",\"UARetExperiment.Superbundle.DemoSection.Tag.TrainingPlan\",\"UARetExperiment.Superbundle.DemoSection.Tag.Nutrition\",\"Nutrition plan with healthy recipes\",\"UARetExperiment.Superbundle.DemoSection.Tag.Mindfulness\",\"Meditation, mindfulness, and beyond\",\"UARetExperiment.Superbundle.DemoSection.Tag.Yoga\",\"Guided functional yoga\",\"UARetExperiment.Superbundle.DemoSection.Tag.Mobility\",\"Daily mobility exercises\",\"UARetExperiment.Superbundle.DemoSection.CTA\",\"Unlock 5 apps with {percentage}% off\",\"NutritionOS.Hero.Heading\",\"Nutrition OS\",\"NutritionOS.Hero.Subheading\",\"Your free introduction to {lineBreak}real nutrition facts and science\",\"NutritionOS.Hero.Discover\",\"Sign up for the Freeletics newsletter to get free access to Nutrition OS and discover the secrets that cut confusion, boost strength, and keep you energized.\",\"NutritionOS.Newsletter.Input.Placeholder\",\"Enter your email...\",\"NutritionOS.Newsletter.Input.Cta.Hero.Desktop\",\"Sign up for access now\",\"NutritionOS.Newsletter.Input.Cta.Disclaimer\",\"When you subscribe to our newsletter, you will receive tailored emails and awesome content from Freeletics products, services, and special offers. You may opt out of the newsletter at any time by following the unsubscribe link in any email we send you. Learn about this and how we handle your data in our \u003cprivacy-policy-link\u003ePrivacy Policy.\u003c/privacy-policy-link\u003e\",\"NutritionOS.Newsletter.Toast.Success\",\"You're in. Your free access is on its way — check your inbox to get started.\",\"NutritionOS.Offer.PreHeading\",\"What do you get?\",\"NutritionOS.Offer.Heading\",\"Insights. Facts. Guidance.\",\"NutritionOS.Offer.Subheading\",\"Nutrition OS unlocks free access to:\",\"NutritionOS.Offer.List.Item1\",\"The Fundamentals of Weight \u0026 Fat Loss\",\"NutritionOS.Offer.List.Item2\",\"Eating for Strength \u0026 Muscle Growth\",\"NutritionOS.Offer.List.Item3\",\"Macronutrient Fact Sheets\",\"NutritionOS.Offer.List.Item4\",\"The Truth About Calories\",\"NutritionOS.Offer.Impact.Heading\",\"Built for Impact\",\"NutritionOS.Offer.Impact.Subheading1\",\"Weight loss\",\"NutritionOS.Offer.Impact.Text1\",\"Understand what really matters and which changes to make so you can finally lose those extra pounds.\",\"NutritionOS.Offer.Impact.Subheading2\",\"Muscle gain\",\"NutritionOS.Offer.Impact.Text2\",\"Get rid of the confusion around calories, protein and what really works for packing on some muscle and strength.\",\"NutritionOS.Offer.Impact.Subheading3\",\"Performance\",\"NutritionOS.Offer.Impact.Text3\",\"The nutrition science behind performing better inside and outside of the gym is clear - you just need to understand it.\",\"NutritionOS.Offer.Impact.Subheading4\",\"Well-being\",\"NutritionOS.Offer.Impact.Text4\",\"There’s almost nothing as impactful on your overall well-being as knowing how to eat well consistently - and doing it.\",\"NutritionOS.FAQ.Heading\",\"Got Questions?\",\"NutritionOS.FAQ.Subheading\",\"Below you will find some of the most frequently asked questions.\",\"NutritionOS.FAQ.Question_1\",\"Who is Nutrition OS for?\",\"NutritionOS.FAQ.Answer_1\",\"It’s for anyone looking to eat and feel better. Whether you’re an athlete, busy professional, or someone who just wants to eat better and feel better, Nutrition OS gives you the clarity and confidence to take control of your diet today.\",\"NutritionOS.FAQ.Question_2\",\"Is this really free? What’s the catch?\",\"NutritionOS.FAQ.Answer_2\",\"Yes—100% free. No hidden paywalls, no credit card, no upsells required to access. We believe in delivering real value upfront. If you love it, you’ll have the option to explore more later.\",\"NutritionOS.FAQ.Question_3\",\"Is this beginner-friendly? Or do I need prior knowledge?\",\"NutritionOS.FAQ.Answer_3\",\"It’s made for everyone. From total beginners to seasoned athletes. Everything is written in plain language with visual breakdowns, examples, and no jargon.\",\"NutritionOS.FAQ.Question_4\",\"Can I access this on mobile or offline?\",\"NutritionOS.FAQ.Answer_4\",\"Yes. It’s designed in Notion, which works on all devices (desktop, tablet, mobile). You can also duplicate it to your own workspace and use it offline anytime.\",\"NutritionOS.FAQ.Question_5\",\"Is this part of a bigger program? Can I go deeper later on?\u2028\",\"NutritionOS.FAQ.Answer_5\",\"Absolutely. Nutrition OS is your gateway into our full Strong, Lean, Healthy course. A complete nutrition system covering mindset, habits, cravings, food marketing, and more. But this free version stands solidly on its own.\",\"CoachLite.ProductCampaignPage.Heading\",\"Upgrade now to train with the new Coach Lite\",\"CoachLiteUpgrade.ProductCampaignPage.Heading\",\"Unlock your full potential.\",\"CoachLiteUpgrade.ProductCampaignPage.Subheading\",\"Go further with advanced plans, more sessions, and smarter integrations.\",\"CoachLiteUpgrade.ProductCampaignPage.ProductDescription.training-coach-pro\",\"For more sessions, faster progress, and a full training plan\",\"CoachLiteUpgrade.ProductCampaignPage.ProductDescription.Features.training-coach-pro.Title\",\"All the benefits from Lite, plus:\",\"CoachLiteUpgrade.ProductCampaignPage.ProductDescription.Features.training-coach-pro.1\",\"More sessions\",\"CoachLiteUpgrade.ProductCampaignPage.ProductDescription.Features.training-coach-pro.1.Detail\",\"Progress faster with up to 5 personalized training sessions every week\",\"CoachLiteUpgrade.ProductCampaignPage.ProductDescription.Features.training-coach-pro.2\",\"Full access to workout library\",\"CoachLiteUpgrade.ProductCampaignPage.ProductDescription.Features.training-coach-pro.2.Detail\",\"Access ition\",\"Race or competition\",\"Longboarding.StepImportantEvent.Button.reunion\",\"Reunion\",\"Longboarding.StepImportantEvent.Button.birthday\",\"Longboarding.StepImportantEvent.Button.other\",\"Longboarding.StepImportantEvent.Button.none\",\"No events, just want to feel my best\",\"Longboarding.StepEventDate.Title\",\"When is your event?\",\"Longboarding.StepEventDate.Info\",\"We will keep this important date in mind for your journey.\",\"Longboarding.StepEventDate.SelectDate\",\"Select Date\",\"Longboarding.StepEventDate.Input.day\",\"Day\",\"Longboarding.StepEventDate.Input.month\",\"Longboarding.StepEventDate.Input.year\",\"Longboarding.StepEventDate.Disclaimer\",\"Your data will be processed in accordance with our Privacy Policy.\",\"Longboarding.StepLastBest.Title\",\"When did you last feel at your best?\",\"Longboarding.StepLastBest.Button.more_than_3_years_ago\",\"More than 3 years ago\",\"Longboarding.StepLastBest.Button.2_3_years_ago\",\"2-3 years ago\",\"Longboarding.StepLastBest.Button.in_the_last_year\",\"In the last year\",\"Longboarding.StepLastBest.Button.now\",\"Longboarding.StepEncouragement.Title\",\"You've felt great before, you'll feel it again\",\"Longboarding.StepEncouragement.Text\",\"Let's rebuild that energy, one workout at a time.\",\"Longboarding.StepEncouragement.Title.Alt\",\"Great! Let's keep that feeling going!\",\"Longboarding.StepEncouragement.Text.Alt\",\"Your Coach will help you reach new goals and make sure you always have a new challenge.\",\"Longboarding.StepBarriers.Title\",\"What gets in your way when staying active?\",\"Longboarding.StepBarriers.Button.lack_of_time\",\"Lack of time\",\"Longboarding.StepBarriers.Button.lack_of_motivation\",\"Lack of motivation\",\"Longboarding.StepBarriers.Button.no_support_or_accountability\",\"No support or accountability\",\"Longboarding.StepBarriers.Button.unsure_where_to_start\",\"Unsure where to start\",\"Longboarding.StepBarriers.Button.lose_interest_quickly\",\"I lose interest quickly\",\"Longboarding.StepBarriers.Button.nothing\",\"Nothing\",\"Longboarding.StepCoachSupport.Title\",\"How do you want your Coach to support you?\",\"Longboarding.StepCoachSupport.Button.effective_plan\",\"Creating an effective and personalized training plan\",\"Longboarding.StepCoachSupport.Button.consistency\",\"Keeping me consistent and celebrating my wins\",\"Longboarding.StepCoachSupport.Button.challenging\",\"Challenging me with new exercises\",\"Longboarding.StepCoachSupport.Button.tracking\",\"Tracking my progress and helping keep me accountable\",\"Longboarding.StepCoachSupport.Button.adjusting\",\"Adjusting my plan based on my energy levels and schedule\",\"Longboarding.StepPride.Title\",\"What would make you feel proud 30 days from now?\",\"Longboarding.StepPride.Button.staying_consistent\",\"Staying consistent\",\"Longboarding.StepPride.Button.progress_strength\",\"Seeing progress in strength or stamina\",\"Longboarding.StepPride.Button.confidence\",\"Feeling more confident in my body\",\"Longboarding.StepPride.Button.energy\",\"Having more energy in my day\",\"Longboarding.StepPride.Button.physical_changes\",\"Noticing physical changes\",\"Longboarding.StepFutureVision.Title\",\"Imagine your future self and where you want to be\",\"Longboarding.StepFutureVision.Text\",\"Your Coach will keep you motivated and push you at just the right intensity to keep you going to your goal.\",\"Longboarding.StepCommitment.Title\",\"I'm ready to start and unlock my best version\",\"Longboarding.StepCommitment.Instruction\",\"{remainingTaps, plural, one {Tap # time to commit.} other {Tap # times to commit.}}\",\"Longboarding.StepCommitment.Button\",\"I’m ready to start\",\"Longboarding.StepCommitmentWithClap.Title\",\"Longboarding.StepCommitmentWithClap.Instruction\",\"Longboarding.StepCommitmentWithClap.Button.gain_strength\",\"Longboarding.StepCommitmentWithClap.Button.lose_weight\",\"Longboarding.StepCommitmentWithClap.Button.build_muscle\",\"Longboarding.StepCommitmentWithClap.Button.burn_fat\",\"Longboarding.StepCommitmentWithClap.Button.general_fitness\",\"Longboarding.StepCommitmentWithClap.Button.improve_endurance\",\"Longboarding.StepCommitmentWithClap.Button.mental_strength\",\"Longboarding.StepCommitmentWithClap.Button.relieve_stress\",\"Longboarding.StepCommitmentWithClap.Button.eat_better\",\"GEOHomepageQuickWins.SectionHero.Topline\",\"GEOHomepageQuickWins.SectionHero.Heading\",\"Personalized workout plans for every fitness goal.\",\"GEOHomepageQuickWins.SectionHero.Subheading\",\"Daily workouts made just for you, updating after each session to help you progress and reach your goals faster.\",\"GEOHomepageQuickWins.SectionHero.CtaWatchDemo\",\"Watch the Demo\",\"GEOHomepageQuickWins.SectionHero.CtaStartNow\",\"GEOHomepageQuickWins.SectionHero.Awards.FiveStarReviews\",\"500k+ five-star reviews\",\"GEOHomepageQuickWins.SectionHero.Awards.AppOfTheDay\",\"GEOHomepageQuickWins.SectionHero.Awards.AppStore\",\"GEOHomepageQuickWins.SectionHero.Awards.GooglePlay\",\"GEOHomepageQuickWins.SectionHero.Awards.EditorsChoice\",\"Editor's Choice\",\"GEOHomepageQuickWins.SectionHowItWorks.Heading\",\"How Freeletics works.\",\"GEOHomepageQuickWins.SectionHowItWorks.Step01.Heading\",\"Tell us your fitness goal\",\"GEOHomepageQuickWins.SectionHowItWorks.Step01.Description\",\"Answer a few questions about your current fitness level, fitness goals, preferred training style, available equipment, and how much time you have to work out.\",\"GEOHomepageQuickWins.SectionHowItWorks.Step02.Heading\",\"Customize your workout plan\",\"GEOHomepageQuickWins.SectionHowItWorks.Step02.Description\",\"Get a fully personalized fitness plan focused on progressive overload, including warmups, cooldowns, mobility, and recovery workouts.\",\"GEOHomepageQuickWins.SectionHowItWorks.Step03.Heading\",\"Train at your pace\",\"GEOHomepageQuickWins.SectionHowItWorks.Step03.Description\",\"Get expert guidance and clear step-by-step video demonstrations to exercise with confidence. Your fitness plan adapts to your feedback and schedule, delivering the workout you need every time.\",\"GEOHomepageQuickWins.SectionHowItWorks.Cta\",\"Do the free assessment\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.Athletes.Count\",\"60 million\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.Athletes.Label\",\"ATHLETES\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.TrainingSessions.Count\",\"450 m+\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.TrainingSessions.Label\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.WorkoutCombinations.Count\",\"1 trillion\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.WorkoutCombinations.Label\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.Exercises.Count\",\"GEOHomepageQuickWins.SectionHowItWorks.Stats.Exercises.Label\",\"GEOHomepageQuickWins.SectionWhoIsItFor.Heading\",\"Who is Freeletics for?\",\"GEOHomepageQuickWins.SectionWhoIsItFor.Subheading\",\"Freeletics is for people who want to get fit and build healthy habits.\",\"GEOHomepageQuickWins.SectionWhoIsItFor.Cta\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Heading\",\"Fitness that fits to you.\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Subheading\",\"Life is unpredictable. Freeletics gives you personalized workouts that fit your busy lifestyle and can be adjusted at a moment's notice.\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature1.Title\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature1.Description\",\"Get flexible workouts that fit your schedule and adapt in real-time, delivering exactly what you need in that moment.\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature2.Title\",\"Training Style\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature2.Description\",\"Pick your workout style. From cardio like running, cycling, and rowing, to classic Freeletics bodyweight HIIT workouts, calisthenics, weighted exercises, or gym machines.\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature3.Title\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature3.Description\",\"Create and personalize your workout locations, like at home or the gym, to easily adjust your scheduled workout to match your current setup.\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature4.Title\",\"Exercises\",\"GEOHomepageQuickWins.SectionFitnessThatFits.Feature4.Description\",\"With hundreds of exercises and on-demand workouts, and even a tool to create your own routines, you'll always find the perfect workout for you.\",\"GEOHomepageQuickWins.SectionFitnessThatFits.TrainingDays.Description\",\"You choose your training days.{lineBreak}Not enough time?{lineBreak}No problem, adjust your session's length.\",\"GEOHomepageQuickWins.SectionFAQ.Heading\",\"GEOHomepageQuickWins.SectionFAQ.Question1\",\"GEOHomepageQuickWins.SectionFAQ.Answer1\",\"Europe’s #1 fitness app that provides fully personalized fitness plans, tailored to your goal, fitness level, and how you like to work out. Whether you exercise from home, train in the gym, or like to mix in some running intervals, Freeletics creates made-for-you workouts complete with warm-ups, cooldowns, mobility, and recovery sessions to help you reach your fitness goals faster than ever.\",\"GEOHomepageQuickWins.SectionFAQ.Question2\",\"GEOHomepageQuickWins.SectionFAQ.Answer2\",\"Freeletics is for all fitness levels, from beginners to advanced athletes looking to progress their exercise skills. The app includes expert guidance and step-by-step video demonstrations to help you train with proper form.\",\"GEOHomepageQuickWins.SectionFAQ.Question3\",\"Is Freeletics for beginners?\",\"GEOHomepageQuickWins.SectionFAQ.Answer3\",\"Yes, workouts are personalized to your fitness level. You can easily adjust exercises, repetitions, and weight during each workout, and your next session will automatically adjust based on your changes and feedback.\",\"GEOHomepageQuickWins.SectionFAQ.Question4\",\"Is Freeletics only bodyweight and calisthenics exercises?\",\"GEOHomepageQuickWins.SectionFAQ.Answer4\",\"No. Freeletics started with .pdfs that used only bodyweight and calisthenics exercises, but the workout plans have since evolved into a fitness app with a wide range of training plans. These include options for free weights, like barbells, dumbbells, and kettlebells, cardio and gym machine workouts, as well as at-home equipment, making it one of the leading gym apps on the market.\",\"GEOHomepageQuickWins.SectionFAQ.Question5\",\"Is Freeletics for at-home workouts or gym workouts?\",\"GEOHomepageQuickWins.SectionFAQ.Answer5\",\"Both. You can set up multiple workout locations with the equipment you have available, making it easy to adjust your workouts wherever you are. Any changes to your workout plan happen in real-time and are just a tap away.\",\"GEOHomepageQuickWins.SectionFAQ.Question6\",\"Is Freeletics free?\",\"GEOHomepageQuickWins.SectionFAQ.Answer6\",\"Freeletics is free to download and gives you access to 74 workouts and 55 exercises without paying. The Freeletics subscription gives you access to our personalized workout plans.\",\"GEOHomepageQuickWins.SectionFAQ.Question7\",\"Do I need equipment to work out with Freeletics?\",\"GEOHomepageQuickWins.SectionFAQ.Answer7\",\"No, every Freeletics workout can be adapted to a bodyweight-only session, allowing you to train anytime, anywhere, and keep progressing towards your goals.\",\"GEOHomepageQuickWins.SectionFAQ.Question8\",\"What is the Freeletics Coach?\",\"GEOHomepageQuickWins.SectionFAQ.Answer8\",\"The Freeletics Coach is our advanced algorithm designed with sports scientists to provide science-backed workouts that are effective and help you achieve your fitness goals using the latest proven methods.\",\"GEOHomepageQuickWins.SectionFAQ.Question9\",\"What type of training plans does Freeletics offer?\",\"GEOHomepageQuickWins.SectionFAQ.Answer9\",\"Freeletics offers workout plans for gaining muscle, weight loss, getting fit, lower body and core-focused, running, kettlebell, dumbbell, barbell, as well as pure strength-focused.\",\"GEOHomepageQuickWins.SectionFAQ.Question10\",\"Can I use Freeletics while travelling?\",\"GEOHomepageQuickWins.SectionFAQ.Answer10\",\"Yes, Freeletics was created with the idea of giving you the ultimate fitness flexibility to work out anywhere, at anytime with what you have available and keeping you on track toward your goals.\",\"GEOHomepageQuickWins.SectionFAQ.Question11\",\"Does Freeletics connect with the Apple Watch?\",\"GEOHomepageQuickWins.SectionFAQ.Answer11\",\"Yes, you can connect Freeletics with an Apple Watch and use your watch to progress through the workout without needing your phone.\",\"GEOHomepageQuickWins.SectionFAQ.Question12\",\"How does Freeletics differ from other fitness apps?\",\"GEOHomepageQuickWins.SectionFAQ.Answer12\",\"Freeletics offers a truly personalized fitness plan where no two workout plans are the same. Your plan updates in real time based on your progress and feedback, creating workouts tailored to your current fitness level. Unlike generic weekly plans, Freeletics evolves with you, delivering the right challenge to help you improve safely and effectively. Strengthen your body each week, train at your own pace, and achieve your goals on your personal timeline.\",\"GEOHomepageQuickWins.SectionFAQ.Question13\",\"Does Freeletics have exercise challenges?\",\"GEOHomepageQuickWins.SectionFAQ.Answer13\",\"Yes, Freeletics offers both official Challenges and lets you create your own custom Challenges to invite friends or other community members. As one of the best exercise challenge apps, Freeletics keeps you motivated and consistent with your workouts, helping you stay on track to reach your fitness goals.\",\"UltimateHulaLandingPage.SectionHero.Error\",\"ERROR 404\",\"UltimateHulaLandingPage.SectionHero.Heading\",\"The Journey you were looking for is an April Fool's joke.\",\"UltimateHulaLandingPage.SectionHero.Text\",\"We’re sorry if you were really looking forward to a hula hooping journey (it is actually a cool idea though). But... we've just launched a new \u003cstrong\u003eREAL\u003c/strong\u003e weight-loss Training Journey called \u003cstrong\u003eUltimate Burn\u003c/strong\u003e – but we haven’t officially announced it yet – so you get a sneak peak!\",\"UltimateHulaLandingPage.SectionAppFeatures.Heading\",\"Now live:{lineBreak}Ultimate Burn\",\"UltimateHulaLandingPage.SectionAppFeatures.Text_1\",\"Ultimate Burn is our first Training Journey that lets you mix running, biking, and rowing cardio in with conditioning and HIIT strength sessions using bodyweight and dozens of equipment types – in whatever way you want.\",\"UltimateHulaLandingPage.SectionAppFeatures.Text_2\",\"Whatever mix you go for, your Coach prioritizes progressively pushing you to a heightened state of metabolic activity and cardio capacity, so you see progress in no time.\",\"UltimateHulaLandingPage.SectionAppFeatures.Text_3\",\"Plus, you can change your session focus every day and even swap exercises anytime you need! It’s the ultimate in flexibility, freedom, and fat-burning results! And it’s real, we promise. So, go check it out now before the masses arrive!\",\"UltimateHulaLandingPage.SectionAppFeatures.Cta\",\"Feel the burn\",\"UltimateHulaLandingPage.SectionCommunity.Heading\",\"See what the Community is already saying about Ultimate Burn!\",\"UltimateHulaLandingPage.SectionCommunity.CTA\",\"Head to the Forum\",\"UltimateHulaLandingPage.SectionFAQ.Question_1\",\"Who is Ultimate Burn for?\",\"UltimateHulaLandingPage.SectionFAQ.Answer_1\",\"Anyone who wants to burn fat. If your weight loss has stalled or you're looking to get more ripped, Ultimate Burn will help you build lean muscle and maximize calorie burn with a mix of strength workouts, cardio, and bodyweight HIIT.\",\"UltimateHulaLandingPage.SectionFAQ.Question_2\",\"How is Ultimate Burn different from the other \\\"Lose weight\\\" Training Journeys?\",\"UltimateHulaLandingPage.SectionFAQ.Answer_2\",\"Ultimate Burn is the newest addition to the next-generation of Freeletics Ultimate Training Journeys with all the updated features unique to Ultimate Strength, and then some!\u003cul\u003e\u003cli\u003e\u003cstrong\u003eTrain with more equipment (if you have it):\u003c/strong\u003e Barbells, dumbbells, kettlebells, resistance bands, weighted vest – reps and weight assigned by the Coach.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eNew Adapt features:\u003c/strong\u003e Change the session's focus, duration, or workout style to get exactly what you need.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSwap exercises at any time:\u003c/strong\u003e adjust to an alternate exercise during your workout without breaking your flow!\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAdjust in real time:\u003c/strong\u003e Adjust reps and weight as you work out to stay in control.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eMobility Days:\u003c/strong\u003e Maintain muscle and joint health while helping you recover smarter on your rest days.\u003c/li\u003e\u003c/ul\u003e\",\"UltimateHulaLandingPage.SectionFAQ.Question_3\",\"What's new in Ultimate Burn?\",\"UltimateHulaLandingPage.SectionFAQ.Answer_3\",\"\u003cul\u003e\u003cli\u003e\u003cstrong\u003eConditioning intervals:\u003c/strong\u003e think God workouts, but personalized. High repetitions, no rest between exercises, and limited rest between rounds.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCardio:\u003c/strong\u003e Steady-State and Cardio Intervals are assigned by the Coach if you enable Cardio as an activity.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCardio equipment:\u003c/strong\u003e You can choose from running or indoor cycling or rowing.\u003c/li\u003e\u003c/ul\u003e\",\"UltimateHulaLandingPage.SectionFAQ.Question_4\",\"What can I expect from Ultimate Burn?\",\"UltimateHulaLandingPage.SectionFAQ.Answer_4\",\"You choose what kind of sessions you want in your fat-burning plan:\u003cul\u003e\u003cli\u003e\u003cstrong\u003
